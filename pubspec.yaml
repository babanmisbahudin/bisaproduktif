name: bisaproduktif
description: "BisaProduktif - Aplikasi produktivitas gamifikasi dengan AI Coach"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Shared Preferences
  shared_preferences: ^2.3.5

  # Local Storage
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.6.2

  # Google Fonts (Poppins)
  google_fonts: ^6.2.1

  # URL Launcher (untuk WhatsApp, phone, dll)
  url_launcher: ^6.3.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.2

  # Gemini AI
  google_generative_ai: ^0.4.6

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Icons
  cupertino_icons: ^1.0.8

  # Audio Music Player
  just_audio: ^0.9.36

  # UUID
  uuid: ^4.0.0

  # Timer & Async
  countup: ^0.1.3

  # Google Mobile Ads (AdMob)
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
